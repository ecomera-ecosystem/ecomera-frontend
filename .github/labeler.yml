# Auto-label rules for PRs and Issues
# --- Framework & Language ---
angular:
  - changed-files:
      - any-glob-to-any-file: [ "src/**/*.ts", "angular.json", "package.json" ]
  - title: [ "angular", "component", "service", "module", "directive", "pipe" ]
  - body: [ "angular", "component", "service", "module", "directive", "ng", "cli" ]

typescript:
  - changed-files:
      - any-glob-to-any-file: [ "src/**/*.ts", "tsconfig*.json", "tslint.json" ]
  - title: [ "typescript", "type", "interface", "enum" ]
  - body: [ "typescript", "type safety", "interface", "generic" ]

html:
  - changed-files:
      - any-glob-to-any-file: [ "src/**/*.html" ]
  - title: [ "html", "template", "markup" ]
  - body: [ "template", "html", "markup", "dom" ]

css:
  - changed-files:
      - any-glob-to-any-file: [ "src/**/*.css", "tailwind.config.js", "src/styles.css" ]
  - title: [ "css", "tailwind", "style", "styling", "responsive" ]
  - body: [ "css", "tailwind", "style", "styling", "layout", "responsive" ]

rxjs:
  - changed-files:
      - any-glob-to-any-file: [ "src/**/*.ts" ]
  - title: [ "rxjs", "observable", "subject", "behavior" ]
  - body: [ "rxjs", "observable", "subscribe", "pipe", "stream" ]

# --- Testing ---
testing:
  - changed-files:
      - any-glob-to-any-file: [ "src/**/*.spec.ts", "src/**/*.mock.ts", "karma.conf.js" ]
  - title: [ "test", "spec", "unit test", "e2e" ]
  - body: [ "testing", "coverage", "spec", "test case", "assertion" ]

jasmine:
  - changed-files:
      - any-glob-to-any-file: [ "src/**/*.spec.ts" ]
  - title: [ "jasmine", "unit test" ]
  - body: [ "jasmine", "@Test", "expect", "describe", "it(" ]

# --- CI/CD & Infra ---
ci-cd:
  - changed-files:
      - any-glob-to-any-file: [ ".github/workflows/**", "Dockerfile", "docker-compose.yml" ]

github-actions:
  - changed-files:
      - any-glob-to-any-file: [ ".github/workflows/**", ".github/**" ]

docker:
  - changed-files:
      - any-glob-to-any-file: [ "Dockerfile", "docker-compose.yml", "**/Dockerfile", "**/docker-compose.yml", ".dockerignore" ]
  - title: [ "docker", "container", "image" ]
  - body: [ "docker", "containerize", "build image", "compose" ]

deployment:
  - changed-files:
      - any-glob-to-any-file: [ "vercel.json", "netlify.toml", "firebase.json", "infra/**" ]

# --- Dependencies ---
dependencies:
  - changed-files:
      - any-glob-to-any-file: [ "package.json", "package-lock.json" ]
  - title: [ "dependency", "deps", "npm", "package" ]
  - body: [ "npm install", "update dependency", "bump version", "dependabot" ]

# --- Documentation ---
documentation:
  - changed-files:
      - any-glob-to-any-file: [ "docs/**", "README.md" ]
  - title: [ "docs", "documentation", "readme", "guide" ]
  - body: [ "how to", "setup", "installation", "usage", "documentation" ]

# --- Generic Workflow Labels ---
bug:
  - title: [ "bug", "error", "fail", "fix", "broken" ]
  - body: [ "unexpected", "crash", "stacktrace", "exception", "does not work", "fails" ]

enhancement:
  - title: [ "feature", "enhancement", "improve", "extend" ]
  - body: [ "new feature", "enhancement", "improvement", "extend functionality" ]

refactor:
  - title: [ "refactor", "cleanup", "restructure", "simplify" ]
  - body: [ "technical debt", "refactor", "cleanup", "remove duplication" ]

question:
  - title: [ "question", "how", "what", "why" ]
  - body: [ "clarify", "explain" ]

help wanted:
  - title: [ "help", "support" ]
  - body: [ "need help", "assist" ]

good first issue:
  - title: [ "good first issue", "beginner" ]
  - body: [ "easy", "starter" ]

blocked:
  - title: [ "blocked", "dependency", "waiting" ]

ready-for-review:
  - title: [ "ready for review", "finished" ]

release:
  - title: [ "release", "tag", "version" ]

duplicate:
  - title: [ "duplicate" ]

invalid:
  - title: [ "invalid" ]

wontfix:
  - title: [ "wontfix" ]

# --- Priority Labels ---
high-priority:
  - title: [ "high priority", "urgent", "critical" ]
  - body: [ "urgent", "critical", "blocker", "asap", "immediate" ]

medium-priority:
  - title: [ "medium priority" ]
  - body: [ "medium priority", "normal", "standard", "moderate" ]

low-priority:
  - title: [ "low priority" ]
  - body: [ "low priority", "minor", "low impact", "non-urgent", "nice to have" ]

# --- Sprint Labels ---
sprint-0:
  - title: [ "sprint-0" ]
  - body: [ "initial setup", "project setup", "setup", "foundation", "initial", "restructure" ]
sprint-1:
  - title: [ "sprint-1" ]
sprint-2:
  - title: [ "sprint-2" ]
sprint-3:
  - title: [ "sprint-3" ]
sprint-4:
  - title: [ "sprint-4" ]
sprint-5:
  - title: [ "sprint-5" ]
