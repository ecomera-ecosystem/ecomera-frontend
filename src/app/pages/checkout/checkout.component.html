<div class="max-w-4xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Checkout</h1>

  <div *ngIf="loading" class="flex justify-center py-20">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <div *ngIf="!loading && cart" class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Shipping Form -->
    <div>
      <h2 class="text-lg font-semibold mb-4">Shipping Address</h2>
      <form [formGroup]="checkoutForm" class="space-y-4">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Street</mat-label>
          <input matInput formControlName="street" placeholder="123 Main St" />
        </mat-form-field>
        <div class="grid grid-cols-2 gap-4">
          <mat-form-field appearance="outline">
            <mat-label>City</mat-label>
            <input matInput formControlName="city" placeholder="Casablanca" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>State</mat-label>
            <input matInput formControlName="state" placeholder="Grand Casablanca" />
          </mat-form-field>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <mat-form-field appearance="outline">
            <mat-label>Zip Code</mat-label>
            <input matInput formControlName="zipCode" placeholder="20000" />
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Country</mat-label>
            <input matInput formControlName="country" placeholder="Morocco" />
          </mat-form-field>
        </div>
      </form>
    </div>

    <!-- Order Summary -->
    <div>
      <h2 class="text-lg font-semibold mb-4">Order Summary</h2>
      <div class="bg-gray-50 rounded-lg p-6 space-y-4">
        <div *ngFor="let item of cart.items" class="flex justify-between text-sm">
          <span class="truncate mr-4">{{ item.productTitle }} x{{ item.quantity }}</span>
          <span class="font-medium">{{ item.subtotal | currency:'MAD':'symbol':'1.2-2' }}</span>
        </div>
        <mat-divider></mat-divider>
        <div class="flex justify-between text-lg font-bold">
          <span>Total</span>
          <span class="text-indigo-600">{{ cart.total | currency:'MAD':'symbol':'1.2-2' }}</span>
        </div>
        <button
          mat-raised-button
          color="primary"
          class="w-full py-6 text-lg"
          [disabled]="checkoutForm.invalid || placing"
          (click)="placeOrder()"
        >
          <mat-icon *ngIf="placing"><mat-spinner diameter="20"></mat-spinner></mat-icon>
          {{ placing ? 'Placing Order...' : 'Place Order' }}
        </button>
      </div>
    </div>
  </div>
</div>
