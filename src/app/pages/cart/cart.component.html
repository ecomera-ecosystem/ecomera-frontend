<div class="max-w-4xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Shopping Cart</h1>

  <div *ngIf="loading" class="flex justify-center py-20">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <div *ngIf="!loading && (!cart || cart.items.length === 0)" class="text-center py-20 text-gray-500">
    <mat-icon class="text-6xl mb-4" style="font-size: 64px; width: 64px; height: 64px;">shopping_cart</mat-icon>
    <p class="text-lg mb-4">Your cart is empty</p>
    <button mat-raised-button color="primary" routerLink="/">Continue Shopping</button>
  </div>

  <div *ngIf="!loading && cart && cart.items.length > 0">
    <!-- Items -->
    <div class="space-y-4 mb-8">
      <div *ngFor="let item of cart.items" class="flex items-center gap-4 bg-white p-4 rounded-lg shadow-sm">
        <img
          [src]="item.productImage"
          [alt]="item.productTitle"
          class="w-20 h-20 object-contain bg-gray-50 rounded"
        />
        <div class="flex-1 min-w-0">
          <h3 class="font-medium text-gray-900 truncate">{{ item.productTitle }}</h3>
          <p class="text-indigo-600 font-bold mt-1">{{ item.unitPrice | currency:'MAD':'symbol':'1.2-2' }}</p>
        </div>
        <input
          type="number"
          min="1"
          [value]="item.quantity"
          (change)="updateQuantity(item, $event)"
          class="w-16 border rounded px-2 py-1 text-center"
        />
        <p class="font-semibold w-24 text-right">{{ item.subtotal | currency:'MAD':'symbol':'1.2-2' }}</p>
        <button mat-icon-button color="warn" (click)="removeItem(item.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>

    <!-- Summary -->
    <div class="bg-white p-6 rounded-lg shadow-sm">
      <div class="flex justify-between text-lg font-bold mb-4">
        <span>Total</span>
        <span class="text-indigo-600">{{ cart.total | currency:'MAD':'symbol':'1.2-2' }}</span>
      </div>
      <div class="flex gap-4">
        <button mat-stroked-button (click)="clearCart()" class="flex-1">Clear Cart</button>
        <button mat-raised-button color="primary" (click)="checkout()" class="flex-1">Proceed to Checkout</button>
      </div>
    </div>
  </div>
</div>
