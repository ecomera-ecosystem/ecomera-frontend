<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 to-white p-4">
    <mat-card class="w-full max-w-sm overflow-hidden rounded-xl shadow-lg">
        <div class="bg-indigo-600 p-6 text-center text-white">
            <img src="Logo.svg" alt="Ecomera Logo" class="w-16 mx-auto mb-2 brightness-0 invert" />
            <h1 class="text-xl font-semibold">Welcome Back</h1>
            <p class="text-indigo-100 text-sm mt-1">Sign in to your account</p>
        </div>

        <mat-card-content class="p-6">
            <form [formGroup]="loginForm" (ngSubmit)="submit()">
                <mat-form-field appearance="outline" class="w-full mb-4">
                    <mat-label>Email</mat-label>
                    <input matInput type="email" formControlName="email" placeholder="Enter your email" />
                    <mat-icon matPrefix>mail</mat-icon>
                    <mat-error *ngIf="email?.invalid && email?.touched">
                        Please enter a valid email
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="w-full mb-2">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" formControlName="password" placeholder="Enter your password" />
                    <mat-icon matPrefix>lock</mat-icon>
                    <mat-error *ngIf="password?.invalid && password?.touched">
                        Password must be at least 8 characters
                    </mat-error>
                </mat-form-field>

                <div class="text-right mb-4">
                    <a routerLink="/login" class="text-sm text-indigo-600 hover:underline">Forgot password?</a>
                </div>

                <button mat-raised-button color="primary" class="w-full" type="submit"
                    [disabled]="loginForm.invalid || loading">
                    <span *ngIf="!loading">Login</span>
                    <mat-spinner *ngIf="loading" diameter="20" class="inline-block"></mat-spinner>
                </button>

                <div *ngIf="error" class="mt-3 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg">
                    {{ error }}
                </div>
            </form>
        </mat-card-content>

        <mat-card-actions class="flex justify-center gap-1 pb-5 px-6 text-sm text-gray-500">
            <span>Don't have an account?</span>
            <a routerLink="/register" class="text-indigo-600 font-medium hover:underline">Create one</a>
        </mat-card-actions>
    </mat-card>
</div>
