<div class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-500 to-cyan-400 p-4">
    <div class="text-center text-white mb-6">
        <img src="Logo.svg" alt="Ecomera Logo" class="w-20 mx-auto mb-3" />
        <p class="text-base mt-2">Welcome back! Please login</p>
    </div>

    <mat-card class="w-full max-w-sm p-6 rounded-xl shadow-xl">
        <mat-card-header>
            <mat-card-title class="title">Login</mat-card-title>
            <mat-card-subtitle>Enter your credentials to log in</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="loginForm" (ngSubmit)="submit()">
                <mat-form-field appearance="outline" class="w-full mb-4">
                    <mat-label>Email</mat-label>
                    <input matInput type="email" formControlName="email" placeholder="Enter your email" />
                    <mat-icon matPrefix>mail</mat-icon>
                    <mat-error *ngIf="email?.invalid && email?.touched">
                        Please enter a valid email
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="w-full mb-4">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" formControlName="password" placeholder="Enter your password" />
                    <mat-icon matPrefix>lock</mat-icon>
                    <mat-error *ngIf="password?.invalid && password?.touched">
                        Password must be at least 8 characters
                    </mat-error>
                </mat-form-field>

                <button mat-raised-button color="primary" class="w-full" type="submit"
                    [disabled]="loginForm.invalid">
                    Login
                </button>

                <div *ngIf="error" class="text-red-500 mt-2 text-center">
                    {{ error }}
                </div>

                <div class="mt-4 text-center text-sm">
                    <a routerLink="/forgot-password">Forgot password?</a> |
                    <a routerLink="/register">Create account</a>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
