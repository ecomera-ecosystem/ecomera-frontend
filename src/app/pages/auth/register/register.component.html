<div class="register-wrapper">
    <div class="branding">
        <!-- <h1 class="app-title">Ecomera</h1> -->
        <img src="Logo.svg" alt="Ecomera Logo" class="logo" />

        <p class="tagline">Create your account</p>
    </div>

    <mat-card class="register-card">
        <mat-card-content>
            <form [formGroup]="registerForm" (ngSubmit)="submit()">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>First Name</mat-label>
                    <input matInput formControlName="firstname" />
                    <mat-icon matPrefix>person</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Last Name</mat-label>
                    <input matInput formControlName="lastname" />
                    <mat-icon matPrefix>person</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email</mat-label>
                    <input matInput type="email" formControlName="email" placeholder="Enter your email" />
                    <mat-icon matPrefix>mail</mat-icon>
                    <mat-error *ngIf="email?.invalid && email?.touched">
                        Please enter a valid email
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" formControlName="password" placeholder="Enter your password" />
                    <mat-icon matPrefix>lock</mat-icon>
                    <mat-error *ngIf="password?.invalid && password?.touched">
                        Password must be at least 8 characters
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Confirm Password</mat-label>
                    <input matInput type="password" formControlName="confirmPassword" placeholder="Enter your password" />
                    <mat-icon matPrefix>lock</mat-icon>
                    <mat-error *ngIf="registerForm.hasError('passwordMismatch') && confirmPassword?.touched">
                        Passwords do not match
                    </mat-error>

                </mat-form-field>

                <button mat-raised-button color="primary" class="full-width" type="submit"
                    [disabled]="registerForm.invalid">
                    Sign Up
                </button>
            </form>
        </mat-card-content>

        <mat-card-actions class="action-text">
            <span>Already have an account?</span>
            <a routerLink="/login">Log in</a>
        </mat-card-actions>
    </mat-card>
</div>
