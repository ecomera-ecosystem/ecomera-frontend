<div class="text-center mb-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-2">Elevate Your Style, Discover the Best Deals</h1>
    <p class="text-gray-500">Shop top trends in fashion, jewelry, and electronics — all in one place, delivered to your door.</p>
</div>

<app-hero-carousel></app-hero-carousel>

<!-- Products Section -->
<section class="max-w-7xl mx-auto px-4 py-12">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">Featured Products</h2>

    <div *ngIf="loading" class="flex justify-center py-12">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="!loading && products.length === 0" class="text-center py-12 text-gray-500">
        No products available.
    </div>

    <div *ngIf="!loading && products.length > 0" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <app-product-card *ngFor="let product of products" [product]="product"></app-product-card>
    </div>
</section>
