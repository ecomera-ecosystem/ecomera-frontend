<owl-carousel-o [options]="customOptions" class="w-full h-[400px] relative block">
    <ng-template carouselSlide>
        <div class="h-[400px] bg-cover bg-center relative flex items-center pl-12 text-white" style="text-shadow: 0 0 8px rgba(0,0,0,0.7); background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <div>
                <h1 class="text-5xl mb-2">Welcome to Ecomera</h1>
                <p class="text-xl mb-5">Discover the latest trends</p>
                <button mat-raised-button color="accent" class="text-base">Shop Now</button>
            </div>
        </div>
    </ng-template>

    <ng-template carouselSlide>
        <div class="h-[400px] bg-cover bg-center relative flex items-center pl-12 text-white" style="text-shadow: 0 0 8px rgba(0,0,0,0.7); background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
            <div>
                <h1 class="text-5xl mb-2">New Arrivals</h1>
                <p class="text-xl mb-5">Fresh styles just for you</p>
                <button mat-raised-button color="accent" class="text-base">Explore</button>
            </div>
        </div>
    </ng-template>

    <ng-template carouselSlide>
        <div class="h-[400px] bg-cover bg-center relative flex items-center pl-12 text-white" style="text-shadow: 0 0 8px rgba(0,0,0,0.7); background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
            <div>
                <h1 class="text-5xl mb-2">Exclusive Offers</h1>
                <p class="text-xl mb-5">Save big on select items</p>
                <button mat-raised-button color="accent" class="text-base">See Deals</button>
            </div>
        </div>
    </ng-template>
</owl-carousel-o>
