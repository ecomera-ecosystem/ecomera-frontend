<owl-carousel-o [options]="customOptions" class="w-full h-[400px] relative block">
    <ng-template carouselSlide>
        <div class="h-[250px] md:h-[400px] bg-cover bg-center relative flex items-center pl-6 md:pl-12 text-white"
             style="background-image: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600&h=500&fit=crop');">
            <div class="absolute inset-0 bg-black/40"></div>
            <div class="relative z-10">
                <h1 class="text-2xl md:text-5xl font-bold mb-2 drop-shadow-lg">Welcome to Ecomera</h1>
                <p class="text-base md:text-xl mb-5 drop-shadow">Discover the latest trends</p>
                <button mat-raised-button color="accent" class="text-base" routerLink="/search">Shop Now</button>
            </div>
        </div>
    </ng-template>

    <ng-template carouselSlide>
        <div class="h-[250px] md:h-[400px] bg-cover bg-center relative flex items-center pl-6 md:pl-12 text-white"
             style="background-image: url('https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1600&h=500&fit=crop');">
            <div class="absolute inset-0 bg-black/40"></div>
            <div class="relative z-10">
                <h1 class="text-2xl md:text-5xl font-bold mb-2 drop-shadow-lg">New Arrivals</h1>
                <p class="text-base md:text-xl mb-5 drop-shadow">Fresh styles just for you</p>
                <button mat-raised-button color="accent" class="text-base" routerLink="/search">Explore</button>
            </div>
        </div>
    </ng-template>

    <ng-template carouselSlide>
        <div class="h-[250px] md:h-[400px] bg-cover bg-center relative flex items-center pl-6 md:pl-12 text-white"
             style="background-image: url('https://images.unsplash.com/photo-1607082349566-187342175e2f?w=1600&h=500&fit=crop');">
            <div class="absolute inset-0 bg-black/40"></div>
            <div class="relative z-10">
                <h1 class="text-2xl md:text-5xl font-bold mb-2 drop-shadow-lg">Exclusive Offers</h1>
                <p class="text-base md:text-xl mb-5 drop-shadow">Save big on select items</p>
                <button mat-raised-button color="accent" class="text-base" routerLink="/search" [queryParams]="{ q: 'sale' }">See Deals</button>
            </div>
        </div>
    </ng-template>
</owl-carousel-o>
