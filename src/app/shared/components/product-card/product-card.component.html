<mat-card class="h-full flex flex-col hover:shadow-xl transition-all duration-300 cursor-pointer group rounded-xl overflow-hidden" (click)="navigateToDetail()">
  <div class="relative h-48 bg-gray-100 flex items-center justify-center overflow-hidden">
    <img [src]="primaryImage" [alt]="product.title" class="w-full h-full object-contain p-4 transition-transform duration-300 group-hover:scale-105" />
    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors duration-300 flex items-center justify-center">
      <span class="bg-white text-gray-900 text-xs font-semibold px-3 py-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-300 shadow">Quick View</span>
    </div>
  </div>
  <mat-card-content class="flex-1 flex flex-col p-4">
    <span class="text-xs text-indigo-600 uppercase tracking-wide font-medium mb-1">{{ product.categoryName }}</span>
    <h3 class="text-sm font-medium text-gray-900 line-clamp-2 mb-2">{{ product.title }}</h3>
    <div class="mt-auto flex items-center justify-between">
      <span class="text-lg font-bold text-gray-900">{{ product.price | currency:'MAD':'symbol':'1.2-2' }}</span>
    </div>
  </mat-card-content>
</mat-card>
