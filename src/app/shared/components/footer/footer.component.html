<mat-toolbar color="primary" class="footer-toolbar" fxLayout="column" fxLayoutGap="20px">
    <!-- Main content: two columns (left + right) -->
    <div class="footer-content" fxLayout="row" fxLayoutAlign="space-between start" fxLayoutGap="40px">

        <!-- Left: Support + Visit -->
        <div class="footer-columns" fxLayout="row" fxLayoutGap="60px">
            <!-- Support -->
            <div class="footer-column">
                <h3 class="footer-title">Support</h3>
                <a mat-button routerLink="/about-us" class="footer-link">About Us</a>
                <a mat-button routerLink="/returns" class="footer-link">Returns</a>
                <a mat-button routerLink="/faqs" class="footer-link">FAQs</a>
            </div>

            <!-- Visit -->
            <div class="footer-column">
                <h3 class="footer-title">Visit</h3>
                <a mat-button routerLink="/terms-and-conditions" class="footer-link">Terms & Conditions</a>
            </div>
        </div>

        <!-- Right: Logo, Socials, Contact -->
        <div fxLayout="column" fxLayoutGap="15px" fxLayoutAlign="start end" class="footer-right">
            <img src="Logo.svg" alt="Ecomera Logo" class="footer-logo" />

            <div fxLayout="row" fxLayoutGap="15px" class="social-links">
                <a href="#" aria-label="Facebook" mat-icon-button>
                    <mat-icon> facebook </mat-icon>
                </a>
                <a href="#" aria-label="Instagram" mat-icon-button>
                    <mat-icon> instagram </mat-icon>
                </a>
                <a href="#" aria-label="Twitter" mat-icon-button>
                    <mat-icon > twitter </mat-icon>
                </a>

                
            </div>

            <div class="contact-info" fxLayout="column" fxLayoutAlign="end end">
                <p>📞 +212 6 12 34 56 78</p>
                <p>✉️ info&#64;ecomera.com</p>
                <p>🏠 123 Street, City, Morocco</p>
            </div>
        </div>
    </div>

    <!-- Bottom line -->
    <mat-divider></mat-divider>
    <div class="footer-bottom" fxLayoutAlign="center center">
        <p>© 2025 Ecomera. All rights reserved.</p>
    </div>
</mat-toolbar>
